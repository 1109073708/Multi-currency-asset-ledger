<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多币种资产账本</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">资产总览</p>
          <h1>多币种资产账本</h1>
        </div>
        <div class="topbar-actions">
          <button class="icon-button" id="export-data" type="button" title="导出数据" aria-label="导出数据">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 17v3h14v-3" /></svg>
          </button>
          <label class="icon-button" title="导入数据" aria-label="导入数据">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 21V9m0 0 4 4m-4-4-4 4M5 7V4h14v3" /></svg>
            <input id="import-data" type="file" accept="application/json" />
          </label>
        </div>
      </header>

      <section class="summary-band" aria-labelledby="summary-title">
        <div class="summary-heading">
          <div>
            <p class="eyebrow">折算总资产</p>
            <h2 id="summary-title">
              <span id="grand-total">HK$0.00</span>
            </h2>
          </div>
          <div class="segmented-control" id="base-currency-tabs" aria-label="选择折算币种"></div>
        </div>
        <div class="currency-totals" id="currency-totals"></div>
      </section>

      <section class="workspace-grid">
        <div class="main-column">
          <section class="table-section" aria-labelledby="banks-title">
            <div class="section-header">
              <div>
                <p class="eyebrow">银行账户</p>
                <h2 id="banks-title">余额明细</h2>
              </div>
              <button class="text-button" id="add-bank-inline" type="button">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
                新增银行
              </button>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>银行</th>
                    <th>余额</th>
                    <th>折算</th>
                    <th class="actions-col">操作</th>
                  </tr>
                </thead>
                <tbody id="bank-table-body"></tbody>
              </table>
              <div class="empty-state" id="bank-empty-state">
                <strong>还没有银行</strong>
                <span>先添加一个银行账户。</span>
              </div>
            </div>
          </section>

          <section class="table-section" aria-labelledby="investments-title">
            <div class="section-header">
              <div>
                <p class="eyebrow">理财账户</p>
                <h2 id="investments-title">理财产品</h2>
              </div>
              <button class="text-button" id="add-product-inline" type="button">
                <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
                新增机构
              </button>
            </div>
            <div class="table-wrap">
              <table class="investment-table">
                <thead>
                  <tr>
                    <th>机构</th>
                    <th>产品</th>
                    <th>币种</th>
                    <th>金额/市值</th>
                    <th>折算</th>
                    <th class="actions-col">操作</th>
                  </tr>
                </thead>
                <tbody id="investment-table-body"></tbody>
              </table>
              <div class="empty-state" id="investment-empty-state">
                <strong>还没有理财机构</strong>
                <span>先添加理财机构，再录入产品。</span>
              </div>
            </div>
          </section>
        </div>

        <aside class="side-panel">
          <section class="panel-block rates-panel" aria-labelledby="rates-title">
            <div class="rates-editor">
              <div class="section-header compact rate-header">
                <div>
                  <h2 id="rates-title">实时汇率</h2>
                </div>
                <button class="icon-button" id="refresh-rates" type="button" title="刷新汇率" aria-label="刷新汇率">
                  <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.3 6.4M3 12A9 9 0 0 1 18.3 5.6M21 4v6h-6M3 20v-6h6" /></svg>
                </button>
              </div>
              <div class="rate-converter" aria-label="汇率换算器">
                <label class="converter-side">
                  <span>从</span>
                  <input id="converter-from-amount" type="number" step="0.01" inputmode="decimal" value="1" />
                  <select id="converter-from-currency"></select>
                </label>
                <button class="icon-button converter-swap" id="converter-swap" type="button" title="交换货币" aria-label="交换货币">
                  <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M7 7h11l-4-4M17 17H6l4 4M18 7l-3 3M6 17l3-3" /></svg>
                </button>
                <label class="converter-side">
                  <span>到</span>
                  <input id="converter-to-amount" type="number" step="0.01" inputmode="decimal" value="" />
                  <select id="converter-to-currency"></select>
                </label>
              </div>
              <div class="rate-list" id="rate-displays"></div>
              <p class="meta-line" id="rates-status">等待更新</p>
            </div>

            <div class="rate-chart" aria-labelledby="rate-chart-title">
              <div class="chart-header">
                <div>
                  <p class="eyebrow">走势</p>
                  <h3 id="rate-chart-title">汇率走势</h3>
                </div>
                <div class="chart-controls">
                  <div class="chart-pair-tabs" id="chart-pair-tabs" aria-label="选择汇率走势"></div>
                  <div class="chart-range-tabs" id="chart-range-tabs" aria-label="选择走势周期"></div>
                </div>
              </div>
              <div class="chart-canvas-wrap">
                <canvas id="rate-chart" width="320" height="180" aria-label="汇率变化折线图"></canvas>
                <div class="chart-tooltip" id="chart-tooltip" hidden></div>
              </div>
              <div class="chart-footer">
                <span id="chart-range">--</span>
                <strong id="chart-latest">--</strong>
              </div>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <template id="bank-row-template">
      <tr>
        <td>
          <input class="bank-name-input" type="text" maxlength="40" aria-label="银行名称" />
        </td>
        <td>
          <div class="balance-list"></div>
        </td>
        <td class="row-total"></td>
        <td class="actions-cell">
          <button class="icon-button edit-bank" type="button" title="编辑余额" aria-label="编辑余额">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></svg>
          </button>
          <button class="icon-button danger delete-bank" type="button" title="删除银行" aria-label="删除银行">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" /></svg>
          </button>
        </td>
      </tr>
    </template>

    <div class="modal-backdrop" id="bank-modal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="bank-modal-title">
        <div class="modal-header">
          <div>
            <p class="eyebrow">银行账户</p>
            <h2 id="bank-modal-title">新增银行</h2>
          </div>
          <button class="icon-button modal-close" type="button" data-close-modal aria-label="关闭弹窗" title="关闭">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
        <form class="modal-form" id="bank-modal-form">
          <label>
            <span>银行名称</span>
            <input id="modal-bank-name" type="text" maxlength="40" placeholder="例如 HSBC" required />
          </label>
          <div class="modal-section-title">
            <span>币种余额</span>
            <button class="text-button small" id="add-bank-balance-row" type="button">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg>
              添加币种
            </button>
          </div>
          <div class="balance-editor" id="bank-balance-editor"></div>
          <div class="modal-actions">
            <button class="secondary-button" type="button" data-close-modal>取消</button>
            <button class="primary-button" type="submit">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5" /></svg>
              保存银行
            </button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop" id="institution-modal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="institution-modal-title">
        <div class="modal-header">
          <div>
            <p class="eyebrow">理财账户</p>
            <h2 id="institution-modal-title">新增机构</h2>
          </div>
          <button class="icon-button modal-close" type="button" data-close-modal aria-label="关闭弹窗" title="关闭">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
        <form class="modal-form" id="institution-modal-form">
          <label>
            <span>机构名称</span>
            <input id="modal-institution-name" type="text" maxlength="40" placeholder="例如 富途证券" required />
          </label>
          <div class="modal-actions">
            <button class="secondary-button" type="button" data-close-modal>取消</button>
            <button class="primary-button" type="submit">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5" /></svg>
              保存机构
            </button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop" id="product-modal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="product-modal-title">
        <div class="modal-header">
          <div>
            <p class="eyebrow">理财账户</p>
            <h2 id="product-modal-title">新增理财产品</h2>
          </div>
          <button class="icon-button modal-close" type="button" data-close-modal aria-label="关闭弹窗" title="关闭">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>
        <form class="modal-form" id="product-modal-form">
          <label>
            <span>理财机构</span>
            <select id="modal-product-institution"></select>
          </label>
          <label class="new-institution-field" id="new-institution-field">
            <span>新机构名称</span>
            <input id="modal-new-institution" type="text" maxlength="40" placeholder="例如 富途证券" />
          </label>
          <label>
            <span>产品名称</span>
            <input id="modal-product-name" type="text" maxlength="60" placeholder="例如 货币基金 A" required />
          </label>
          <div class="product-grid">
            <label>
              <span>金额/市值</span>
              <input id="modal-product-value" type="number" step="1" inputmode="decimal" value="0" required />
            </label>
          </div>
          <div class="modal-section-title">
            <span>产品币种</span>
          </div>
          <div class="balance-editor" id="product-currency-editor"></div>
          <div class="modal-actions">
            <button class="secondary-button" type="button" data-close-modal>取消</button>
            <button class="primary-button" type="submit">
              <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5" /></svg>
              保存产品
            </button>
          </div>
        </form>
      </section>
    </div>

    <template id="currency-row-template">
      <div class="currency-row">
        <label>
          <span>币种</span>
          <select class="currency-select"></select>
        </label>
        <label class="custom-currency-code-field">
          <span>自定义代码</span>
          <input class="custom-currency-code" type="text" maxlength="6" placeholder="EUR" />
        </label>
        <label class="custom-currency-label-field">
          <span>名称</span>
          <input class="custom-currency-label" type="text" maxlength="20" placeholder="欧元" />
        </label>
        <label>
          <span>金额</span>
          <input class="currency-amount" type="number" step="1" inputmode="decimal" value="0" />
        </label>
        <button class="icon-button danger remove-currency-row" type="button" title="移除币种" aria-label="移除币种">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M5 12h14" /></svg>
        </button>
      </div>
    </template>

    <template id="investment-row-template">
      <tr>
        <td class="product-indent-cell">
          <span class="product-indent-marker" aria-hidden="true"></span>
        </td>
        <td>
          <input class="product-name-input" type="text" maxlength="60" aria-label="产品名称" />
        </td>
        <td>
          <select class="product-currency-select" aria-label="产品币种"></select>
        </td>
        <td>
          <input class="product-value-input" type="number" step="1" inputmode="decimal" aria-label="产品金额或市值" />
        </td>
        <td class="row-total"></td>
        <td class="actions-cell">
          <button class="icon-button danger delete-product" type="button" title="删除产品" aria-label="删除产品">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" /></svg>
          </button>
        </td>
      </tr>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
